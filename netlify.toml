[build]
  command = "nx run-many -t build --projects=web,functions"
  publish = "dist/apps/web"

[functions]
  directory = "dist/apps/functions"

[[redirects]]
  from = "/admin"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
