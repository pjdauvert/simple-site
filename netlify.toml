[build]
  command = "nx run-many -t build --projects=web,functions"
  publish = "dist/apps/web"

[functions]
  directory = "dist/apps/functions"

[dev]
  # netlify dev proxies localhost:8888 → Vite on 5173, and serves functions at /api/*
  command = "nx run web:dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false

# API requests go to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# All other requests serve the React app (SPA fallback — must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
