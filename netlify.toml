[build]
  command = "nx run-many -t build --projects=web,functions"
  publish = "dist/apps/web"

[functions]
  directory = "dist/apps/functions"

[dev]
  # netlify dev proxies localhost:8888 → Vite on 5173, and serves functions at /api/*
  # publish points to the source public dir (no _redirects there) so the SPA
  # fallback in dist/apps/web/_redirects does not intercept Vite's virtual
  # module paths (@vite/client, @react-refresh, /src/*).
  command = "nx run web:dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false
  publish = "apps/web/public"

# API requests go to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# SPA fallback is emitted into dist/apps/web/_redirects by the Vite build plugin
# (see apps/web/vite.config.ts). Not listed here to avoid intercepting Vite's
# virtual modules (@vite/client, @react-refresh, /src/*) in netlify dev.
